<!doctype html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#111111" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Räystäs" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="manifest.webmanifest?v=2" />
  <title>Räystään jiirilaskuri</title>
  <style>
    *{box-sizing:border-box}body{margin:0;background:#111;color:#ccc;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}.app{min-height:100vh;display:flex;flex-direction:column}.topbar{padding:13px 20px;border-bottom:1px solid #1c1c1c;display:flex;gap:12px;align-items:baseline;position:sticky;top:0;background:#111;z-index:10}.brand{color:#e8c84a;font-weight:700;letter-spacing:.1em;font-size:13px}.subtle{color:#2a2a2a;font-size:10px}.main{display:flex;flex:1;flex-wrap:wrap}.panel{padding:20px;flex:0 0 285px;border-right:1px solid #181818}.content{flex:1;padding:20px;min-width:300px}.section-title{font-size:9px;color:#3a3a3a;letter-spacing:.12em;text-transform:uppercase;margin:0 0 12px}.field{margin-bottom:14px}.label{font-size:10px;color:#555;letter-spacing:.1em;text-transform:uppercase;margin-bottom:2px}.help{font-size:9px;color:#383838;margin-bottom:4px;line-height:1.35}.row{display:flex;align-items:center;gap:8px}input[type=number]{width:86px;background:#0c0c0c;border:1px solid #282828;border-radius:3px;color:#e8c84a;padding:5px 8px;font-size:15px;font-family:inherit;outline:none}input[type=range]{flex:1;accent-color:#e8c84a}.unit{color:#333;font-size:11px;width:25px}.card{background:#0c0c0c;border:1px solid #1c1c1c;border-radius:6px;padding:12px 16px}.canvas-card{background:#0c0c0c;border:1px solid #1c1c1c;border-radius:6px;padding:10px 6px;margin-bottom:20px;overflow:hidden}canvas{width:100%;max-width:540px;display:block;margin:0 auto}.stat{display:flex;justify-content:space-between;align-items:baseline;padding:5px 0;border-bottom:1px solid #161616;gap:14px}.stat-label{font-size:10px;color:#444}.stat-value{font-size:13px;font-family:inherit;color:#aaa;white-space:nowrap}.stat-unit{font-size:10px;color:#333;margin-left:2px}.piece{font-size:9px;margin-bottom:6px;letter-spacing:.1em}.divider{border-top:1px solid #1a1a1a;margin-top:8px;padding-top:14px}.chiprow{display:flex;gap:8px;margin-bottom:14px}button{font-family:inherit}.chip{flex:1;padding:8px;border-radius:3px;border:1px solid #222;background:#0c0c0c;color:#555;font-size:10px;letter-spacing:.08em}.chip.active{border-color:#e8c84a66;color:#e8c84a}.error{color:#cc4a4a;font-size:11px}.note{margin-top:12px;font-size:9px;color:#2a2a2a;line-height:1.35}@media(max-width:720px){.panel{flex:1 1 100%;border-right:0;border-bottom:1px solid #181818}.content{padding-top:10px}}
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar"><span class="brand">RÄYSTÄÄN JIIRILASKURI</span><span class="subtle">pwa · toimii ilman npm-ajelua</span></div>
    <div class="main">
      <div class="panel">
        <p class="section-title">Kulman mittaus</p>
        <div class="chiprow"><button id="directBtn" class="chip active">SUORA °</button><button id="measureBtn" class="chip">MITATTU</button></div>
        <div id="directFields"></div><div id="measureFields" style="display:none"></div><div id="commonFields"></div>
        <div class="divider"><p class="section-title">Yläpinnan leveydet</p><div id="widthFields"></div></div>
        <div class="divider"><p class="section-title">Osan B taitokset</p><div id="tabFields"></div></div>
      </div>
      <div class="content">
        <p class="section-title">Ylhäältä katsottuna</p>
        <div class="canvas-card"><canvas id="view" width="540" height="300"></canvas><div class="note" style="text-align:center">valkoinen piste = jiirin kohtaamispiste · katkoviivat = jiirilinjat</div></div>
        <p class="section-title">Valmistusmitat</p><div id="stats"></div>
      </div>
    </div>
  </div>
<script>
const DEFAULTS={angleMode:'direct',cornerAngle:90,measureA:1000,measureB:1000,measureC:1414,widthA:300,widthB:300,legLength:150,length:1000,thickness:.7,topTab:50,legTab:100};
const state=JSON.parse(localStorage.getItem('raystaan-jiirilaskuri-state')||localStorage.getItem('cladding-configurator-state')||'null')||DEFAULTS;
function save(){localStorage.setItem('raystaan-jiirilaskuri-state',JSON.stringify(state))}function set(k,v){state[k]=Number.isFinite(v)?v:state[k];save();render()}function setMode(m){state.angleMode=m;save();render()}function rad(d){return d*Math.PI/180}function clamp(n,min,max){return Math.max(min,Math.min(max,n))}function round(n,d=1){return +n.toFixed(d)}
function angleFromMeasurements(a,b,c){if(a<=0||b<=0||c<=0)return null;if(c>=a+b||c<=Math.abs(a-b))return null;const x=(a*a+b*b-c*c)/(2*a*b);return round(Math.acos(clamp(x,-1,1))*180/Math.PI,2)}
function effectiveAngle(){return state.angleMode==='measured'?angleFromMeasurements(state.measureA,state.measureB,state.measureC):state.cornerAngle}
function derive(p){const cornerAngle=effectiveAngle();if(!cornerAngle)return null;const{widthA,widthB,length,legLength,topTab,legTab}=p;const a=rad(cornerAngle),cosA=Math.cos(a),sinA=Math.sin(a);if(sinA<.001)return null;const offsetA=(widthB+widthA*cosA)/sinA,offsetB=(widthA+widthB*cosA)/sinA;const miterA=round(Math.atan2(widthA,offsetA)*180/Math.PI,1),miterB=round(Math.atan2(widthB,offsetB)*180/Math.PI,1);return{cornerAngle,offsetA,offsetB,miterA,miterB,longA:round(length+offsetA,1),longB:round(length+offsetB,1),flatA:widthA+2*legLength,flatB:widthB+2*topTab+2*(legLength+legTab),valid:offsetA>0&&offsetB>0}}
function num(container,label,key,unit='mm',min=1,max=2000,step=1,sub=''){const value=state[key];container.insertAdjacentHTML('beforeend',`<div class="field"><div class="label">${label}</div>${sub?`<div class="help">${sub}</div>`:''}<div class="row"><input id="num-${key}" type="number" value="${value}" min="${min}" max="${max}" step="${step}"><span class="unit">${unit}</span><input id="range-${key}" type="range" value="${value}" min="${min}" max="${max}" step="${step}"></div></div>`);document.getElementById('num-'+key).oninput=e=>set(key,Number(e.target.value));document.getElementById('range-'+key).oninput=e=>set(key,Number(e.target.value))}
function buildControls(){directBtn.className=state.angleMode==='direct'?'chip active':'chip';measureBtn.className=state.angleMode==='measured'?'chip active':'chip';directFields.style.display=state.angleMode==='direct'?'':'none';measureFields.style.display=state.angleMode==='measured'?'':'none';[directFields,measureFields,commonFields,widthFields,tabFields].forEach(e=>e.innerHTML='');num(directFields,'Kulma','cornerAngle','°',10,170,1,'Rakennuksen kahden sivun välinen kulma');num(measureFields,'Mitta A','measureA','mm',100,6000,1,'Merkitse tämä matka kulmasta osan A suuntaan');num(measureFields,'Mitta B','measureB','mm',100,6000,1,'Merkitse tämä matka kulmasta osan B suuntaan');num(measureFields,'Ristimitta C','measureC','mm',100,9000,1,'Suora mitta kahden merkkipisteen välillä');if(state.angleMode==='measured')measureFields.insertAdjacentHTML('beforeend',`<div class="note">Laskettu kulma: <span style="color:#e8c84a">${effectiveAngle()??'virheellinen'}°</span></div>`);num(commonFields,'Pituus lyhyeltä sivulta','length','mm',200,6000,1);num(commonFields,'Sivun korkeus','legLength','mm',30,600,1);num(commonFields,'Ainevahvuus','thickness','mm',.4,3,.1);widthFields.insertAdjacentHTML('beforeend','<div class="help" style="color:#e8c84a55">Osa A</div>');num(widthFields,'Leveys A','widthA','mm',50,800,1);widthFields.insertAdjacentHTML('beforeend','<div class="help" style="color:#4a8fcc55">Osa B (pohja ja taitokset)</div>');num(widthFields,'Leveys B','widthB','mm',50,800,1);num(tabFields,'Ylätaitos','topTab','mm',10,150,1);num(tabFields,'Sivutaitos','legTab','mm',30,200,1)}
function draw(){const canvas=document.getElementById('view'),ctx=canvas.getContext('2d'),CW=canvas.width,CH=canvas.height;ctx.clearRect(0,0,CW,CH);const d=derive(state);if(!d||!d.valid){ctx.fillStyle='#cc4a4a';ctx.font='12px monospace';ctx.textAlign='center';ctx.fillText('virheellinen kulma tai mitat',CW/2,CH/2);return}const{widthA,widthB,length}=state,a=rad(d.cornerAngle),cosA=Math.cos(a),sinA=Math.sin(a),inX=sinA,inY=-cosA;const pA=[[0,0],[length,0],[length,widthA],[d.offsetA,widthA]],pB=[[0,0],[length*cosA,length*sinA],[length*cosA+widthB*inX,length*sinA+widthB*inY],[d.offsetB*cosA+widthB*inX,d.offsetB*sinA+widthB*inY]];const all=[...pA,...pB],xs=all.map(p=>p[0]),ys=all.map(p=>p[1]),minX=Math.min(...xs),maxX=Math.max(...xs),minY=Math.min(...ys),maxY=Math.max(...ys),pad=44,s=Math.min((CW-pad*2)/Math.max(maxX-minX,1),(CH-pad*2)/Math.max(maxY-minY,1),2),tx=p=>(p[0]-minX)*s+pad,ty=p=>(p[1]-minY)*s+pad;function poly(raw,stroke,fill){ctx.save();ctx.strokeStyle=stroke;ctx.fillStyle=fill;ctx.lineWidth=2;ctx.lineJoin='round';ctx.beginPath();raw.forEach((p,i)=>i?ctx.lineTo(tx(p),ty(p)):ctx.moveTo(tx(p),ty(p)));ctx.closePath();ctx.fill();ctx.stroke();ctx.restore()}poly(pB,'#4a8fcc','#4a8fcc1a');poly(pA,'#e8c84a','#e8c84a1a');const meet=[d.offsetA,widthA];ctx.save();ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(tx(meet),ty(meet),4,0,Math.PI*2);ctx.fill();ctx.restore();ctx.save();ctx.setLineDash([5,4]);ctx.lineWidth=1;ctx.strokeStyle='#e8c84a55';ctx.beginPath();ctx.moveTo(tx([0,0]),ty([0,0]));ctx.lineTo(tx(meet),ty(meet));ctx.stroke();ctx.strokeStyle='#4a8fcc55';ctx.beginPath();ctx.moveTo(tx([0,0]),ty([0,0]));ctx.lineTo(tx(meet),ty(meet));ctx.stroke();ctx.restore();ctx.save();ctx.strokeStyle='#444';ctx.lineWidth=1;const r=Math.min(s*60,38),ox=tx([0,0]),oy=ty([0,0]);ctx.beginPath();ctx.arc(ox,oy,r,0,a);ctx.stroke();ctx.fillStyle='#555';ctx.font='10px monospace';ctx.textAlign='center';ctx.fillText(`${d.cornerAngle}°`,ox+(r+10)*Math.cos(a/2),oy+(r+10)*Math.sin(a/2));ctx.restore();function lbl(text,p,off,color,align='center'){ctx.save();ctx.fillStyle=color;ctx.font='11px monospace';ctx.textAlign=align;ctx.textBaseline='middle';ctx.fillText(text,tx(p)+off[0],ty(p)+off[1]);ctx.restore()}lbl(`A: ${widthA}`,[length/2,0],[0,-14],'#e8c84a');lbl(`B: ${widthB}`,[length/2*cosA,length/2*sinA],[-14,0],'#4a8fcc','right');lbl(`${length} mm`,[length/2,widthA],[0,14],'#555');lbl(`↔ ${d.offsetA.toFixed(0)}`,[d.offsetA/2,widthA],[0,14],'#e8c84a55')}
function stat(label,value,unit='mm',color='#aaa',derived=false){return`<div class="stat"><span class="stat-label">${label}${derived?'<span style="color:#1a3a1a;margin-left:4px">↳</span>':''}</span><span class="stat-value" style="color:${color}">${value??'—'}<span class="stat-unit">${unit}</span></span></div>`}
function renderStats(){const d=derive(state);if(!d){stats.innerHTML='<div class="error">Virheellinen mitattu kolmio tai kulma</div>';return}if(!d.valid){stats.innerHTML='<div class="error">Leveyden ja kulman yhdistelmä tuottaa negatiivisen siirtymän — muuta leveyksiä tai kulmaa</div>';return}stats.innerHTML=`<div class="card">${state.angleMode==='measured'?stat('Laskettu kulma',d.cornerAngle,'°','#e8c84a',true):''}<div class="piece" style="color:#e8c84a44;margin-top:8px">OSA A</div>${stat('Leveys A',state.widthA,'mm','#e8c84a')}${stat('Lyhyt sivu',state.length)}${stat('Pitkä sivu',d.longA,'mm','#e8c84a')}${stat('Jiirisiirtymä',d.offsetA.toFixed(1),'mm','#e8c84a88',true)}${stat('Jiirikulma päädystä',d.miterA,'°','#e8c84a88',true)}${stat('Aihioleveys',d.flatA,'mm','#e8c84a')}<div class="piece" style="color:#4a8fcc44;margin-top:14px">OSA B</div>${stat('Leveys B',state.widthB,'mm','#4a8fcc')}${stat('Lyhyt sivu',state.length)}${stat('Pitkä sivu',d.longB,'mm','#4a8fcc')}${stat('Jiirisiirtymä',d.offsetB.toFixed(1),'mm','#4a8fcc88',true)}${stat('Jiirikulma päädystä',d.miterB,'°','#4a8fcc88',true)}${stat('Aihioleveys taitoksineen',d.flatB,'mm','#4a8fcc')}<div class="note">${d.cornerAngle}° kulma · jiiri A ${d.miterA}° / B ${d.miterB}° · ainevahvuus ${state.thickness}</div></div>`}
function render(){buildControls();draw();renderStats()}directBtn.onclick=()=>setMode('direct');measureBtn.onclick=()=>setMode('measured');render();if('serviceWorker'in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js?v=2').catch(()=>{}))}
</script>
</body>
</html>
